<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" width="880" height="360"
     font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif"
     role="img" aria-label="agentlie architecture: a Claude Code .jsonl session is parsed into a per-turn DAG with file before/after state, the extractor pulls fix/add/remove/rename/update claims, the verifier runs a tree-sitter AST delta against the real edits, and the reporter prints a PASS / VAGUE / LIE verdict table">
  <defs>
    <marker id="ah-l" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#B9B9C2"/></marker>
  </defs>
  <rect x="0" y="0" width="880" height="360" fill="#F5F5F7"/>

  <!-- offline frame -->
  <rect x="24" y="28" width="832" height="308" rx="18" fill="none" stroke="#5E5CE6" stroke-opacity="0.4" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="44" y="50" font-size="13" font-weight="600" fill="#4B3FC4">In-process · offline · no API key · no upload</text>

  <!-- connectors -->
  <g stroke="#C9C9D0" stroke-width="1.6" fill="none">
    <line x1="208" y1="200" x2="252" y2="200" marker-end="url(#ah-l)"/>
    <line x1="408" y1="200" x2="452" y2="200" marker-end="url(#ah-l)"/>
    <line x1="608" y1="200" x2="652" y2="200" marker-end="url(#ah-l)"/>
  </g>

  <!-- Session input -->
  <g>
    <rect x="44" y="148" width="164" height="104" rx="15" fill="#0071E3" fill-opacity="0.10" stroke="#0071E3" stroke-width="1.5"/>
    <text x="126" y="176" text-anchor="middle" font-size="14" font-weight="700" fill="#0A4F9E">Claude Code</text>
    <text x="126" y="196" text-anchor="middle" font-size="13" font-weight="600" fill="#0A4F9E">session .jsonl</text>
    <text x="126" y="222" text-anchor="middle" font-size="11" fill="#37618C">turns · tool calls</text>
    <text x="126" y="238" text-anchor="middle" font-size="11" fill="#37618C">originalFile state</text>
  </g>

  <!-- parser -->
  <g>
    <rect x="252" y="148" width="156" height="104" rx="15" fill="#5E5CE6" fill-opacity="0.10" stroke="#5E5CE6" stroke-width="1.5"/>
    <text x="330" y="176" text-anchor="middle" font-size="14" font-weight="700" fill="#4B3FC4">parser.py</text>
    <text x="330" y="198" text-anchor="middle" font-size="11" fill="#5048B8">parentUuid DAG</text>
    <text x="330" y="216" text-anchor="middle" font-size="11" fill="#5048B8">per-turn split</text>
    <text x="330" y="234" text-anchor="middle" font-size="11" fill="#5048B8">FileStateTracker</text>
  </g>

  <!-- extractor -->
  <g>
    <rect x="452" y="148" width="156" height="104" rx="15" fill="#5E5CE6" fill-opacity="0.10" stroke="#5E5CE6" stroke-width="1.5"/>
    <text x="530" y="176" text-anchor="middle" font-size="14" font-weight="700" fill="#4B3FC4">extractor.py</text>
    <text x="530" y="198" text-anchor="middle" font-size="11" fill="#5048B8">fix·add·remove</text>
    <text x="530" y="216" text-anchor="middle" font-size="11" fill="#5048B8">rename·update</text>
    <text x="530" y="234" text-anchor="middle" font-size="11" fill="#5048B8">→ ClaimSpan</text>
  </g>

  <!-- verifier -->
  <g>
    <rect x="652" y="148" width="184" height="104" rx="15" fill="#10A37F" fill-opacity="0.08" stroke="#10A37F" stroke-width="1.6"/>
    <text x="744" y="176" text-anchor="middle" font-size="14" font-weight="700" fill="#0B6B53">verifier.py</text>
    <text x="744" y="198" text-anchor="middle" font-size="11" fill="#0E7C66">tree-sitter AST delta</text>
    <text x="744" y="216" text-anchor="middle" font-size="11" fill="#0E7C66">verb → required delta</text>
    <text x="744" y="234" text-anchor="middle" font-size="11" fill="#0E7C66">Python · TypeScript</text>
  </g>

  <!-- verdict / report row -->
  <g stroke="#C9C9D0" stroke-width="1.6" fill="none">
    <line x1="744" y1="252" x2="744" y2="284" marker-end="url(#ah-l)"/>
  </g>
  <g>
    <rect x="252" y="284" width="584" height="40" rx="12" fill="#10A37F" fill-opacity="0.10" stroke="#10A37F" stroke-width="1.4"/>
    <text x="272" y="309" font-size="13" font-weight="700" fill="#0B6B53">report.py</text>
    <text x="352" y="309" font-size="12" fill="#3f3a2e">Rich table · --json</text>
    <g font-size="12" font-weight="700">
      <text x="560" y="309" fill="#0B6B53">PASS</text>
      <text x="640" y="309" fill="#9A7400">VAGUE</text>
      <text x="730" y="309" fill="#C0392B">LIE</text>
    </g>
  </g>
</svg>
